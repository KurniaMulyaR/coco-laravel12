<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COCO — Digital Agency | Our Client</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            coco: {
              teal: '#1a4a5c',
              sky:  '#87ceeb',
              cream:'#f5f0eb',
              dark: '#0c2535',
            }
          },
          fontFamily: {
            playfair: ['"Playfair Display"', 'Georgia', 'serif'],
            dm:       ['"DM Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-white">

  <!-- ═══════════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════ -->
  <nav class="navbar">
    <img src="assets/logo_coco.png" alt="COCO Digital Agency" class="nav-logo" />
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#client" class="active">Client</a></li>
    </ul>
  </nav>

  <!-- ═══════════════════════════════════════
       HERO SECTION
  ═══════════════════════════════════════ -->
  <section class="hero-section-services" id="home">

    <!-- Sky background -->
    <img src="assets/ourclient/background_top.png" alt="" class="hero-bg-services" />

    <!-- Decorative: Paper Planes -->
    <!-- <img src="assets/pesawat_kanan.png" alt="" class="plane plane-right" />
    <img src="assets/pesawat_kiri.png"  alt="" class="plane plane-left"  /> -->

    <!-- Decorative: Balloons -->
    <!-- <img src="assets/balon_besar.png" alt="" class="balloon balloon-large" />
    <img src="assets/balon_kecil.png" alt="" class="balloon balloon-small" /> -->


    <!-- Hero Content -->
    <div class="hero-content-services reveal">
      <h1 class="coco-text">
        Our Client
      </h1>
    </div>
    
  </section>
  <section class="card-our-client-section">
        <div class="clients-section">
          <div class="clients-grid">
            <img src="assets/ourclient/wardah.png" alt="Wardah">
            <img src="assets/ourclient/makeover.png" alt="Make Over">
            <img src="assets/ourclient/aqua.png" alt="Aqua">
            <img src="assets/ourclient/kahf.png" alt="Kahf">
            <img src="assets/ourclient/emina.png" alt="Emina">
            <img src="assets/ourclient/yamaha.png" alt="Yamaha">
            <img src="assets/ourclient/gatsby.png" alt="Gatsby">
            <img src="assets/ourclient/omg.png" alt="OMG Oh My Glam">
            <img src="assets/ourclient/sagmoto.png" alt="Sagivoto">
            <img src="assets/ourclient/rituals.png" alt="Rituals">
            <img src="assets/ourclient/lovessemprong.png" alt="Loves Semprong">
            <img src="assets/ourclient/bravo.png" alt="Bravo">
            <img src="assets/ourclient/rotio.png" alt="RotiO">
          </div>
        </div>
  </section>
<!-- ═══════════════════════════════════════
       Our Client Get In touch
  ═══════════════════════════════════════ -->
  
      <!-- Torn paper top edge -->
      <section id="about" class="card-client-section">

        <div class="contact-section">
          <h2 class="contact-title">Get in Touch</h2>
          <div class="contact-divider"></div>

          <div class="contact-form">
            <div class="form-group">
              <label>Name</label>
              <input type="text" placeholder="Enter your name here">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="Enter your email here">
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" placeholder="Enter your phone here">
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea placeholder="Type your message"></textarea>
            </div>
            <button class="btn-send">Send Message</button>
          </div>

          
        <img src="assets/ourclient/bunga.png" class="bunga bunga-right" />
        <img src="assets/ourclient/bunga.png" class="bunga bunga-left" />
        </div>


      </section>

  <!-- ═══════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════ -->
  <footer id="contact" class="footer" style="margin-top: -5rem;">
     <div class="footer-logo">
        <img src="assets/logo_coco.png" alt="COCO Digital Agency" />
     </div>
      <div class="footer-logo-line"></div>
      <nav class="footer-nav">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Clients</a>
      </nav>
      <p class="footer-privacy">Privacy Notice &amp; Terms of Services</p>
      <div class="footer-social">
        <a href="#" aria-label="Instagram">
          <i class="ti ti-brand-instagram"></i>
        </a>
      </div>
      <p class="footer-copy">© 2026 Coco Agency</p>
  </footer>

  <!-- ── Scripts ── -->
  <script src="js/main.js"></script>

</body>
</html>
